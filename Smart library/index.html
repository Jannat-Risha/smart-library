<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BAUET Smart Library Access System</title>

    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="login-box">

            <!-- Left Panel -->
            <div class="left-panel">
                <h1>Welcome to</h1>
                <h2>BAUET Smart Library Access System</h2>
                <p>Official Digital Library Access Platform of BAUET</p>
            </div>

            <!-- Right Panel -->
            <div class="right-panel">
                <div class="icon">👤</div>

                <form>

                    <input type="text" placeholder="Username" required>
                    <input type="password" placeholder="Password" required>

                    <div class="options">
                        <label>
                            <input type="checkbox"> Show Password
                        </label>
                    </div>

                    <!-- Login Button (Redirect to Dashboard) -->
                    <a href="dashboard.html">
                        <button type="button" class="login-btn">Login</button>
                    </a>

                    <button class="clear-btn" type="reset">Clear</button>

                </form>
            </div>

        </div>
    </div>

</body>

</html>
